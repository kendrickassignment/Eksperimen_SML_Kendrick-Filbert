name: Automated Preprocessing Pipeline

on:
  push:
    branches: [ main ]
    paths:
      - 'preprocessing/**'
      - 'breast_cancer_raw.csv'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  preprocessing:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12.7'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy scikit-learn scipy
    
    - name: Run preprocessing automation
      run: |
        cd preprocessing
        python automate_Kendrick-Filbert.py --output_dir .
    
    - name: Verify preprocessed files
      run: |
        echo "=== Checking preprocessed files ==="
        ls -la preprocessing/breast_cancer_train_preprocessing.csv
        ls -la preprocessing/breast_cancer_test_preprocessing.csv
        echo "=== Preview train data ==="
        head -5 preprocessing/breast_cancer_train_preprocessing.csv
    
    - name: Commit and push preprocessed data
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add preprocessing/breast_cancer_train_preprocessing.csv
        git add preprocessing/breast_cancer_test_preprocessing.csv
        git add breast_cancer_raw.csv || true
        git diff --staged --quiet || git commit -m "Auto-update preprocessed dataset [skip ci]"
        git push || echo "Nothing to push"
    
    - name: Upload preprocessed artifacts
      uses: actions/upload-artifact@v4
      with:
        name: preprocessed-dataset
        path: |
          preprocessing/breast_cancer_train_preprocessing.csv
          preprocessing/breast_cancer_test_preprocessing.csv
        retention-days: 30
